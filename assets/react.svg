<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <style>
        .react-logo {
            fill: none;
            stroke: #61dafb;
            stroke-width: 4;
            stroke-linejoin: round;
        }
        .electron {
            fill: #61dafb;
        }
    </style>
    
    <!-- Electron Orbits -->
    <ellipse cx="50" cy="50" rx="45" ry="15" class="react-logo" transform="rotate(0 50 50)" />
    <ellipse cx="50" cy="50" rx="45" ry="15" class="react-logo" transform="rotate(60 50 50)" />
    <ellipse cx="50" cy="50" rx="45" ry="15" class="react-logo" transform="rotate(120 50 50)" />
    
    <!-- Nucleus -->
    <circle cx="50" cy="50" r="8" class="electron" />
</svg>